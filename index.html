<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPLIT - Fashion Models</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">MODELS</div>
        <div class="nav-center">SPLIT</div>
        <div class="nav-right">CONTACT</div>
    </header>

    <main class="split-container">
        <!-- Left Side: Maris -->
        <section class="split-section left">
            <div class="overlay-text">
                <p class="location">OSLO</p>
                <div class="name-box">
                    <h1>MARIS</h1>
                </div>
                <p class="view-cta">VIEW MODEL</p>
            </div>
            <div class="model-image" style="background-image: url('https://images.unsplash.com/photo-1549439602-43ebca2327af?auto=format&fit=crop&q=80&w=1200');"></div>
        </section>

        <!-- Right Side: Ivory -->
        <section class="split-section right">
            <div class="overlay-text">
                <p class="location">MILANO</p>
                <div class="name-box">
                    <h1>IVORY</h1>
                </div>
                <p class="view-cta">VIEW MODEL</p>
            </div>
            <div class="model-image" style="background-image: url('https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&q=80&w=1200');"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-left">
            <button class="footer-btn prev-btn">PREV</button>
        </div>
        <div class="footer-center">
            <div class="pagination">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
        <div class="footer-right">
            <button class="footer-btn next-btn">NEXT</button>
        </div>
        <div class="attribution">@fabianponten</div>
    </footer>
</body>
</html>
